<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Maestro Manager</title>
        <link rel="icon" href="../../src/assets/imgs/favicon.svg" type="image/svg+xml">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="../../css/main.css">
    </head>
    
    <body>
    
        <aside class="sidebar-hover bg-light border-end d-flex flex-column p-3">

            <a id="navbar-brand" class="d-flex align-items-center gap-2 text-decoration-none justify-content-center">
                <img src="../../src/assets/imgs/full-logo.svg" alt="Full Logo" style="max-width: 70%; height: auto;" class="full-logo">
                <img src="../../src/assets/imgs/main-logo.svg" alt="Logo Icon" style="max-width: 70%; height: auto;" class="main-logo">
            </a>

            <hr class="my-3 text-secondary" style="opacity: 0.2;">

            <ul class="nav nav-pills flex-column mb-auto gap-2" id="sidebar-items">
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-3" href="../index/index.html">
                        <i class="bi bi-house fs-5"></i>
                        <span class="nav-text">Painel Inicial</span>
                    </a>
                </li>
                
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-3" href="#">
                        <i class="bi bi-cart3 fs-5"></i>
                        <span class="nav-text">Ponto de Venda</span>
                    </a>
                </li>
                
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-3" href="#">
                        <i class="bi bi-box-seam fs-5"></i>
                        <span class="nav-text">Estoque & Produtos</span>
                    </a>
                </li>
                
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-3" href="#">
                        <i class="bi bi-tools fs-5"></i> <span class="nav-text">Luthieria e Serviços</span>
                    </a>
                </li>   
                
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-3" href="#">
                        <i class="bi bi-people fs-5"></i>
                        <span class="nav-text">Clientes</span>
                    </a>
                </li>
                
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-3" href="#">
                        <i class="bi bi-graph-up-arrow fs-5"></i>
                        <span class="nav-text">Financeiro</span>
                    </a>
                </li>
            </ul>

            <div class="mt-2">
                <a id="support-btn" class="btn w-100 fw-bold border-0" href="../support/support.html">
                    <i class="bi bi-code-square me-2"></i> Suporte
                </a>
            </div>
        </aside>

        <main>
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h2 fw-bold">Dashboard</h1>
            </div>

            <div class="column mb-4 g-4">
                <div class="col-md-12 mb-3">
                    <div class="dashboard-card h-100 p-3">
                        <h5 class="fw-bold">Total de Instrumentos</h5>
                        <div class="placeholder-chart mt-3">
                            <i class="bi bi-pie-chart fs-1"></i>
                        </div>
                    </div>
                </div>
                
                <div class="row col-md-12">
                    <div class="col-md-6">
                        <div class="dashboard-card h-100 p-3">
                            <h5 class="fw-bold">Níveis de Estoque</h5>
                            <div class="placeholder-chart mt-3">
                                <i class="bi bi-graph-up fs-1"></i>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="dashboard-card h-100 p-3">
                            <h5 class="fw-bold">Totais de Vendas</h5>
                            <div class="placeholder-chart mt-3">
                                <i class="bi bi-bar-chart fs-1"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Instruments Grade -->
            <h4 class="fw-bold mb-3 mt-5">Instrumentos em Destaque</h4>
            <div id="featured-instruments" class="row g-4">
                <!-- Featured instruments will be dynamically inserted here -->
            </div>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        <script src="./index.js"></script>
    </body>
</html>
